<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote of the Day</title>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-53MF1TLXXR"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-53MF1TLXXR');
    </script>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #fafafa;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: #333;
            text-align: center;
            padding: 20px;
        }

        /* Container styling for both the quote and the about section */
        .content-container {
            max-width: 600px;
            animation: fadeIn 1.5s ease-in-out;
        }

        .quote {
            font-size: 1.5rem;
            font-style: italic;
            line-height: 1.4;
            margin-bottom: 15px;
        }

        .author {
            font-size: 1rem;
            color: #777;
            font-weight: bold;
        }

        /* NEW: Pins the button to the top right of the screen */
        .nav-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            padding: 8px 16px;
            background-color: transparent;
            border: 1px solid #ccc;
            border-radius: 20px;
            color: #777;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            background-color: #eee;
            color: #333;
            border-color: #999;
        }

        .hidden {
            display: none;
        }

        .troll-text {
            font-size: 1.2rem;
            line-height: 1.5;
            margin-bottom: 10px;
        }

        .cliffhanger {
            font-style: italic;
            color: #888;
            margin-top: 20px;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(10px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <button id="top-btn" class="nav-btn" onclick="toggleView()">About Me</button>

    <div id="view-quote" class="content-container">
        <div class="quote">"The only limit to our realization of tomorrow will be our doubts of today."</div>
        <div class="author">— Franklin D. Roosevelt</div>
    </div>

    <div id="view-about" class="content-container hidden">
        <div class="troll-text">
            Coming Soon
        </div>
        <div class="cliffhanger">
            check back later.
        </div>
    </div>

    <script>
        // We use a simple toggle to know which page we are on
        let isAboutView = false;

        function toggleView() {
            isAboutView = !isAboutView; // Flip the switch

            if (isAboutView) {
                // Show "About", Hide "Quote", Change button text
                document.getElementById('view-quote').classList.add('hidden');
                document.getElementById('view-about').classList.remove('hidden');
                document.getElementById('top-btn').innerText = '← Back';

                // Fire the tracking event to Google Analytics
                gtag('event', 'clicked_about_me', {
                    'event_category': 'engagement',
                    'event_label': 'User took the bait'
                });
                console.log("Hooked one! Event sent to Analytics.");

            } else {
                // Revert back to the Quote page
                document.getElementById('view-about').classList.add('hidden');
                document.getElementById('view-quote').classList.remove('hidden');
                document.getElementById('top-btn').innerText = 'About Me';
            }
        }
    </script>

</body>

</html>
