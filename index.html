<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- <meta http-equiv="refresh" content="4;url=https://YOUR_NEW_LINK_HERE.com">  -->

    <title>Quote of the Day</title>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #fafafa;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: #333;
            text-align: center;
            padding: 20px;
        }

        .quote-container {
            max-width: 600px;
            /* Creates a smooth fade-in effect */
            animation: fadeIn 1.5s ease-in-out;
        }

        .quote {
            font-size: 1.5rem;
            font-style: italic;
            line-height: 1.4;
            margin-bottom: 15px;
        }

        .author {
            font-size: 1rem;
            color: #777;
            font-weight: bold;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(10px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="quote-container">
        <div class="quote">"The only limit to our realization of tomorrow will be our doubts of today."</div>
        <div class="author">— Franklin D. Roosevelt</div>
    </div>

</body>

</html>
